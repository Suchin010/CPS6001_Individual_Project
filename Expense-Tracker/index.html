<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expense Tracker</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>Expense Tracker</h1>

    <div class="menu">
      ⋮
      <div class="dropdown"><p onclick="logout()">Logout</p>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button onclick="showTab('dashboard')" class="active">Dashboard</button>
    <button onclick="showTab('transactions')">Transactions</button>
    <button onclick="showTab('insights')">Insights</button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="tab active">

    <div class="cards">
      <div class="card income">
        <h4>Income</h4>
        <p id="income">£0.00</p>
      </div>

      <div class="card expense">
        <h4>Expense</h4>
        <p id="expense">£0.00</p>
      </div>

      <div class="card balance">
        <h4>Balance</h4>
        <p id="balance">£0.00</p>
      </div>
    </div>

    <div class="charts">
      <div class="card"><canvas id="chart1"></canvas></div>
      <div class="card"><canvas id="chart2"></canvas></div>
    </div>

  </div>

  <!-- TRANSACTIONS -->
  <div id="transactions" class="tab">

    <div class="form-card">
      <form id="form">
        <div class="row">
          <input type="text" id="text" placeholder="Description" required>
          <input type="number" id="amount" placeholder="Amount" required>
        </div>

        <div class="row">
          <select id="type" onchange="toggleCategory()">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>

          <select id="category">
            <option value="food">Food</option>
            <option value="travel">Travel</option>
            <option value="necessities">Necessities</option>
            <option value="unwanted">Unwanted</option>
          </select>
        </div>

        <button>Add Transaction</button>
      </form>
    </div>

    <div class="card">
      <ul id="list"></ul>
    </div>

  </div>

  <!-- INSIGHTS -->
  <div id="insights" class="tab">
    <div class="insight-grid">
      <div class="card" id="topCategory"></div>
      <div class="card" id="savingTip"></div>
      <div class="card" id="dailyTip"></div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
